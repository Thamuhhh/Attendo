name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > android/app/keystore.pem
          openssl base64 -d -in android/app/keystore.pem -out android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=app/keystore.jks" >> android/key.properties

      - run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=debug-info --target-platform android-arm64

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/attendo-${{ github.ref_name }}.apk

      - name: Create Release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/app/outputs/flutter-apk/attendo-${{ github.ref_name }}.apk \
            --title "Release ${GITHUB_REF_NAME}" \
            --notes "Auto-built APK for ${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ github.token }}
