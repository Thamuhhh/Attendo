name: Build & Release APK

on:
  push:
    branches: [master]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build_apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > android/app/keystore.pem
          openssl base64 -d -in android/app/keystore.pem -out android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=app/keystore.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=debug-info --target-platform android-arm64

      - name: Rename APK
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/attendo-v${VER}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendo-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/*.apk
