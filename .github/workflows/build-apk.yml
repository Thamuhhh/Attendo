name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - run: flutter pub get

      - name: Create key.properties for CI
        run: |
          cat > android/key.properties << EOF
          storePassword=attendopass
          keyPassword=attendopass
          keyAlias=attendokey
          storeFile=app/keystore.jks
          EOF

      - name: Auto-increment version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$COMMIT_COUNT" >> $GITHUB_ENV
          echo "BUILD_NAME=1.0.$COMMIT_COUNT" >> $GITHUB_ENV

      - run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/attendo-v$BUILD_NAME.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: attendo-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/attendo-*.apk
