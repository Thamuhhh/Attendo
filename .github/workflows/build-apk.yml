name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: flutter pub get

      - name: Auto-increment version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$COMMIT_COUNT" >> $GITHUB_ENV
          echo "BUILD_NAME=1.0.$COMMIT_COUNT" >> $GITHUB_ENV

      - run: flutter build apk --debug

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk "build/app/outputs/flutter-apk/attendo-v$BUILD_NAME.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: attendo-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/attendo-*.apk
